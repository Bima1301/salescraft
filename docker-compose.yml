services:
  postgres:
    image: postgres:16-alpine
    container_name: salescraft-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: salescraft
      POSTGRES_PASSWORD: salescraft
      POSTGRES_DB: salescraft
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - shared_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    container_name: salescraft
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      postgres:
        condition: service_started
    networks:
      - shared_net

volumes:
  postgres_data:

networks:
  shared_net:
    external: true
    name: shared_net
